name: Build Windows Installer

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Windows (NSIS)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install WebView2 (pre-installed on runners, but ensure)
        run: |
          Write-Host "WebView2 runtime check"
          if (Test-Path "C:\Program Files (x86)\Microsoft\EdgeWebView") {
            Write-Host "WebView2 found"
          } else {
            Write-Host "WebView2 not found - installing"
            winget install --id Microsoft.EdgeWebView2Runtime --silent --accept-package-agreements --accept-source-agreements
          }

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile || npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --verbose

      - name: List build output
        run: |
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File | Select-Object FullName, Length

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: RouterAdmin-Setup-x64
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: RouterAdmin-MSI-x64
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download NSIS installer
        uses: actions/download-artifact@v4
        with:
          name: RouterAdmin-Setup-x64
          path: dist/

      - name: Download MSI installer
        uses: actions/download-artifact@v4
        with:
          name: RouterAdmin-MSI-x64
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
          generate_release_notes: true
