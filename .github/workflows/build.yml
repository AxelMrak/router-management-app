name: Build Windows Installer

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Windows (NSIS)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile || npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --verbose

      - name: List build output
        run: |
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File | Select-Object FullName, Length

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: RouterAdmin-Setup-x64
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: RouterAdmin-MSI-x64
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  create-release:
    name: Create Public Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download NSIS installer
        uses: actions/download-artifact@v4
        with:
          name: RouterAdmin-Setup-x64
          path: dist/

      - name: Download MSI installer
        uses: actions/download-artifact@v4
        with:
          name: RouterAdmin-MSI-x64
          path: dist/

      - name: Delete existing "latest" release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create Public Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "RouterAdmin — Latest Build"
          body: |
            Latest build from `main` branch.

            **Built:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}

            ## Downloads
            - **RouterAdmin_0.1.0_x64-setup.exe** — NSIS installer (recommended)
            - **RouterAdmin_0.1.0_x64_en-US.msi** — MSI installer

            ## Installation
            1. Download the `.exe` or `.msi` file
            2. Double-click to install
            3. Launch "RouterAdmin" from the Start menu
          draft: false
          prerelease: false
          files: dist/*
